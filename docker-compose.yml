services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.runCommand('ping').ok" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: mevn_backend
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/test-db
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (res) => res.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 2s
      retries: 10
    depends_on:
      mongodb:
        condition: service_healthy
      ext-api-service:
        condition: service_healthy

  ext-api-service:
    build:
      context: ./ext-api-service
      dockerfile: Dockerfile
    container_name: ext_api_service
    ports:
      - "8081:8080"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 5s
      timeout: 2s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: mevn_frontend
    ports:
      - "8080:80"
    environment:
      - VITE_BACKEND_URL=http://backend:3000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongodb_data:
